services:
  bot:
    build: .
    container_name: lumi-bot
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://lumi:lumi@db:5432/lumi
      - PORT=${PORT:-8000}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: postgres:16-alpine
    container_name: lumi-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: lumi
      POSTGRES_PASSWORD: lumi
      POSTGRES_DB: lumi
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lumi"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
